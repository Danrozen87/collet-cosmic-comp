name: Build Collet Compositor

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build cosmic-comp (Fedora ARM64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    container:
      image: fedora:43
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            git gcc g++ make cmake clang-devel pkg-config \
            rust cargo \
            wayland-devel libxkbcommon-devel \
            mesa-libEGL-devel mesa-libgbm-devel \
            libinput-devel systemd-devel \
            libseat-devel pixman-devel \
            pango-devel cairo-devel \
            dbus-devel pipewire-devel \
            libdisplay-info-devel

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Verify binary
        run: |
          file target/release/cosmic-comp
          ldd target/release/cosmic-comp

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-comp-arm64
          path: target/release/cosmic-comp
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: latest
          name: Latest Build
          files: target/release/cosmic-comp
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
